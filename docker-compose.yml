services:
  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: element-call-frontend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=nangman-infra-meet"
    restart: unless-stopped
    ports:
      - "8082:80"
    env_file:
      - ./frontend/.env.deploy
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  backend:
    image: ${BACKEND_IMAGE}
    container_name: element-call-backend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=nangman-infra-meet"
    restart: unless-stopped
    env_file:
      - ./backend/.env
    expose:
      - "8787"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8787/internal/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  watchtower:
    image: containrrr/watchtower:latest
    container_name: element-call-watchtower
    command:
      - --http-api-update
      - --cleanup
      - --label-enable
      - --scope
      - nangman-infra-meet
      - --interval
      - "0"
      - --api-version
      - "1.44"
    environment:
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN}
      WATCHTOWER_SCOPE: nangman-infra-meet
    ports:
      - "18081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "com.centurylinklabs.watchtower.scope=nangman-infra-meet"
