services:
  postgres:
    profiles:
      - localdb
    image: postgres:17-alpine
    container_name: element-call-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nangman_infra_meet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - element-call-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nangman_infra_meet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  frontend:
    build:
      context: ./frontend
    image: nangman-infra-meet-frontend:local
    container_name: element-call-frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    env_file:
      - ./frontend/.env.deploy
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  backend:
    build:
      context: ./backend
    image: nangman-infra-meet-backend:local
    container_name: element-call-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    expose:
      - "8787"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8787/internal/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  element-call-postgres-data:
