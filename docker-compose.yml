services:
  element-call:
    build:
      context: .
    image: nangman-infra-meet:local
    container_name: element-call
    restart: unless-stopped
    ports:
      - "8082:80"
    env_file:
      - .env.deploy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
